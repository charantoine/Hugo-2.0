name: Multi-tenant smoke

on:
  push:
    branches: [main, master]
    paths:
      - 'hugo_back/**'
      - 'hugo-hugolucia/frontend_1.8/**'
      - '.github/workflows/multitenant-smoke.yml'
  pull_request:
    paths:
      - 'hugo_back/**'
      - 'hugo-hugolucia/frontend_1.8/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: hugo_back

jobs:
  backend-tenant-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hugo_poc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: postgres
      TEST_DB_NAME: hugo_poc_test
      HUGO_RLS_STRICT: "1"
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hugo_back/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Migrate & RLS role
        run: |
          python manage.py migrate --noinput
          psql -U postgres -h localhost -d hugo_poc_test -f scripts/setup_rls_app_role.sql || true
          psql -U postgres -h localhost -d hugo_poc_test -c \
            "GRANT SELECT ON TABLE hugo_session, hugo_message, trace, evidence, export_run, learner_state TO hugo_app_tenant_test;" || true

      - name: Multi-tenant backend smoke
        run: chmod +x scripts/run_multitenant_smoke.sh && ./scripts/run_multitenant_smoke.sh

  playwright-tenant-smoke:
    runs-on: ubuntu-latest
    needs: backend-tenant-smoke

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hugo_poc_test
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      TEST_DB_HOST: localhost
      TEST_DB_PORT: 5432
      TEST_DB_USER: postgres
      TEST_DB_PASSWORD: postgres
      TEST_DB_NAME: hugo_poc_test
      HUGO_RLS_STRICT: "0"
      RUN_PLAYWRIGHT_SMOKE: "1"
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hugo-hugolucia/frontend_1.8/package-lock.json

      - name: Backend setup
        working-directory: hugo_back
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py bootstrap_multitenant_smoke
          python manage.py runserver 8000 &
          sleep 3

      - name: Playwright tenant e2e
        working-directory: hugo-hugolucia/frontend_1.8
        env:
          VITE_FRONTEND_MODE: tester
          SMOKE_RUN_TENANT: "1"
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npm run test:smoke -- tests_playwright/e2e/tenant_*.spec.ts
